name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Matches the Dockerfile's python:3.12-slim.
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run normalizer unit tests
        # Unit tests for thai_normalizer.py: number conversion, mai-yamok
        # expansion, and the normalize_for_tts wrapper. Known bugs tracked in
        # issues #1/#2/#3 are marked @unittest.expectedFailure, so this stays
        # green while they are open and goes red if a fix lands without the
        # test being updated.
        run: python tests/test_normalizer.py -v
      - name: Run end-to-end tests
        # Spins up a mock TTS upstream + the real proxy in-process and asserts
        # normalization, transparent forwarding, and the multipart clone path.
        run: python tests/test_proxy_e2e.py
